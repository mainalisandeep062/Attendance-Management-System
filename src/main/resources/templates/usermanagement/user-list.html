<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>User List</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="d-flex">

    <!-- Sidebar -->
    <div th:replace="fragments/sidebar :: sidebar"></div>

    <!-- Content -->
    <div class="flex-grow-1 p-4">

        <div class="d-flex justify-content-between mb-3">
            <h2>Users</h2>
            <a href="/users/add" class="btn btn-success">+ Add User</a>
        </div>

        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

        <!-- Tabs -->
        <ul class="nav nav-tabs mb-3">
            <li class="nav-item">
                <button class="nav-link active" onclick="filterStatus('ALL')">All</button>
            </li>
            <li class="nav-item">
                <button class="nav-link" onclick="filterStatus('INACTIVE')">Inactive</button>
            </li>
        </ul>

        <!-- Table -->
        <table class="table table-bordered table-striped" id="userTable">
            <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Username</th>
                <th>Mobile</th>
                <th>Email</th>
                <th>Role</th>
                <th>Status</th>
                <th style="width:220px;">Actions</th>
            </tr>
            </thead>

            <tbody>
            <tr th:each="u : ${usersDtoList}"
                th:attr="data-status=${u.isActive} ? 'ACTIVE' : 'INACTIVE'">

                <td th:text="${u.id}"></td>
                <td th:text="${u.username}"></td>
                <td th:text="${u.mobileNumber}"></td>
                <td th:text="${u.email}"></td>
                <td th:text="${u.role}"></td>

                <!-- Status -->
                <td>
                    <span th:if="${u.isActive}" class="badge bg-success">Active</span>
                    <span th:unless="${u.isActive}" class="badge bg-secondary">Inactive</span>
                </td>

                <!-- Actions -->
                <td>

                    <a th:href="@{/users/edit/{id}(id=${u.id})}"
                       class="btn btn-sm btn-primary">Edit</a>

                    <!-- Toggle Button -->
                    <a th:href="@{/users/toggle/{id}(id=${u.id})}"
                       th:text="${u.isActive} ? 'Deactivate' : 'Activate'"
                       th:classappend="${u.isActive} ? ' btn-warning' : ' btn-success'"
                       class="btn btn-sm">
                    </a>

<!--                    <a th:href="@{/users/delete/{id}(id=${u.id})}"-->
                    <!--                       class="btn btn-sm btn-danger"-->
                    <!--                       onclick="return confirm('Delete this user?')">-->
                    <!--                        Delete-->
                    <!--                    </a>-->

                </td>
            </tr>
            </tbody>
        </table>

        <!-- Pagination -->
        <nav>
            <ul class="pagination" id="pagination"></ul>
        </nav>

    </div>

</div>

<!-- JS -->
<script>

    let currentPage = 1;
    const rowsPerPage = 15;
    let currentFilter = 'ALL';

    function showPage(page) {
        const rows = document.querySelectorAll("#userTable tbody tr");
        let filtered = [];

        rows.forEach(row => {
            const status = row.getAttribute("data-status");
            if (currentFilter === 'ALL' || status === currentFilter) {
                filtered.push(row);
            }
            row.style.display = "none";
        });

        const start = (page - 1) * rowsPerPage;
        const end = start + rowsPerPage;

        filtered.slice(start, end).forEach(row => {
            row.style.display = "";
        });

        setupPagination(filtered.length);
    }

    function setupPagination(totalRows) {
        const pageCount = Math.ceil(totalRows / rowsPerPage);
        const pagination = document.getElementById("pagination");
        pagination.innerHTML = "";

        for (let i = 1; i <= pageCount; i++) {
            const li = document.createElement("li");
            li.className = "page-item " + (i === currentPage ? "active" : "");

            const a = document.createElement("a");
            a.className = "page-link";
            a.innerText = i;
            a.onclick = () => {
                currentPage = i;
                showPage(i);
            };

            li.appendChild(a);
            pagination.appendChild(li);
        }
    }

    function filterStatus(status) {
        currentFilter = status;
        currentPage = 1;

        // Highlight active tab
        document.querySelectorAll(".nav-link").forEach(btn => btn.classList.remove("active"));
        event.target.classList.add("active");

        showPage(1);
    }

    document.addEventListener("DOMContentLoaded", () => {
        showPage(1);
    });

</script>

</body>
</html>
