<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add User</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body>

<div class="d-flex">
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>
    <div th:replace="~{fragments/sidebar :: allcss}"></div>


    <div class="flex-grow-1 p-4">

        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>Add User</h2>
            <a href="/users" class="btn btn-outline-secondary">
                <i class="bi bi-arrow-left"></i> Back to Users
            </a>
        </div>

        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

        <div class="card shadow-sm border-0 rounded-3">
            <div class="card-header bg-dark text-white py-3">
                <h5 class="mb-0">
                    <i class="bi bi-person-plus me-2"></i>New User Details
                </h5>
            </div>
            <div class="card-body p-4">

                <form th:action="@{/users/add}" th:object="${userDto}" method="post">

                    <div class="row g-4">

                        <!-- Username -->
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">
                                <i class="bi bi-person me-1"></i>Username
                            </label>
                            <input type="text" th:field="*{username}"
                                   class="form-control form-control-lg"
                                   placeholder="Enter username" required>
                        </div>

                        <!-- Password -->
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">
                                <i class="bi bi-lock me-1"></i>Password
                            </label>
                            <input type="password" th:field="*{password}"
                                   class="form-control form-control-lg"
                                   placeholder="Enter password" required>
                        </div>

                        <!-- Mobile -->
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">
                                <i class="bi bi-phone me-1"></i>Mobile Number
                            </label>
                            <input type="text" th:field="*{mobileNumber}"
                                   class="form-control form-control-lg"
                                   placeholder="98XXXXXXXX" required>
                        </div>

                        <!-- Email -->
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">
                                <i class="bi bi-envelope me-1"></i>Email
                            </label>
                            <input type="email" th:field="*{email}"
                                   class="form-control form-control-lg"
                                   placeholder="example@email.com" required>
                        </div>

                        <!-- Role -->
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">
                                <i class="bi bi-shield me-1"></i>Role
                            </label>
                            <select th:field="*{role}"
                                    class="form-select form-select-lg" required>
                                <option value="">Select Role</option>
                                <option th:each="r : ${roles}"
                                        th:value="${r}"
                                        th:text="${r}">
                                </option>
                            </select>
                        </div>

                        <!-- Status -->
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">
                                <i class="bi bi-toggle-on me-1"></i>Status
                            </label>
                            <select class="form-select form-select-lg">
                                <option value="true">Active</option>
                                <option value="false">Inactive</option>
                            </select>
                        </div>

                        <!-- Divider -->
                        <div class="col-12">
                            <hr class="my-1"/>
                        </div>

                        <!-- Buttons -->
                        <div class="col-12 d-flex gap-2 justify-content-end">
                            <a href="/users" class="btn btn-outline-secondary btn-lg px-4">
                                <i class="bi bi-x-circle me-1"></i>Cancel
                            </a>
                            <button type="submit" class="btn btn-primary btn-lg px-4">
                                <i class="bi bi-check-circle me-1"></i>Save User
                            </button>
                        </div>

                    </div>

                </form>

            </div>
        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
