<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Dashboard</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body>

<div class="d-flex">

    <!-- Sidebar -->
    <div th:replace="fragments/sidebar :: sidebar"></div>

    <!-- Content -->
    <div class="flex-grow-1 p-4 bg-light">

        <h3 class="mb-4 fw-bold">Dashboard</h3>

        <!-- Cards Row -->
        <div class="row g-4">

            <!-- Total Students -->
            <div class="col-md-3">
                <div class="card shadow-sm border-0">
                    <div class="card-body d-flex align-items-center">
                        <i class="bi bi-mortarboard fs-1 text-primary me-3"></i>
                        <div>
                            <h6 class="text-muted">Total Students</h6>
                            <h4 th:text="${totalStudents}">120</h4>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Total Teachers -->
            <div class="col-md-3">
                <div class="card shadow-sm border-0">
                    <div class="card-body d-flex align-items-center">
                        <i class="bi bi-person-workspace fs-1 text-success me-3"></i>
                        <div>
                            <h6 class="text-muted">Total Teachers</h6>
                            <h4 th:text="${totalTeachers}">25</h4>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Total Users -->
            <div class="col-md-3">
                <div class="card shadow-sm border-0">
                    <div class="card-body d-flex align-items-center">
                        <i class="bi bi-people fs-1 text-info me-3"></i>
                        <div>
                            <h6 class="text-muted">Total Users</h6>
                            <h4 th:text="${totalUsers}">40</h4>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Total Courses -->
            <div class="col-md-3">
                <div class="card shadow-sm border-0">
                    <div class="card-body d-flex align-items-center">
                        <i class="bi bi-book fs-1 text-warning me-3"></i>
                        <div>
                            <h6 class="text-muted">Total Courses</h6>
                            <h4 th:text="${totalCourses}">15</h4>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Active Courses -->
            <div class="col-md-3">
                <div class="card shadow-sm border-0">
                    <div class="card-body d-flex align-items-center">
                        <i class="bi bi-play-circle fs-1 text-success me-3"></i>
                        <div>
                            <h6 class="text-muted">Active Courses</h6>
                            <h4 th:text="${activeCourses}">10</h4>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Completed Courses -->
            <div class="col-md-3">
                <div class="card shadow-sm border-0">
                    <div class="card-body d-flex align-items-center">
                        <i class="bi bi-check-circle fs-1 text-secondary me-3"></i>
                        <div>
                            <h6 class="text-muted">Completed Courses</h6>
                            <h4 th:text="${completedCourses}">5</h4>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Today's Attendance -->
            <div class="col-md-3">
                <div class="card shadow-sm border-0">
                    <div class="card-body d-flex align-items-center">
                        <i class="bi bi-calendar-check fs-1 text-primary me-3"></i>
                        <div>
                            <h6 class="text-muted">Today's Attendance</h6>
                            <h4 th:text="${todayAttendance}">90%</h4>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Absent Students -->
            <div class="col-md-3">
                <div class="card shadow-sm border-0">
                    <div class="card-body d-flex align-items-center">
                        <i class="bi bi-person-x fs-1 text-danger me-3"></i>
                        <div>
                            <h6 class="text-muted">Absent Today</h6>
                            <h4 th:text="${absentStudents}">12</h4>
                        </div>
                    </div>
                </div>
            </div>

        </div>

        <!-- Extra Section -->
        <div class="mt-5">
            <h5 class="mb-3">Quick Actions</h5>

            <a href="/users/add" class="btn btn-primary me-2">
                <i class="bi bi-person-plus"></i> Add User
            </a>

            <a href="/course" class="btn btn-success me-2">
                <i class="bi bi-book"></i> Manage Courses
            </a>

            <a href="/teacher" class="btn btn-warning">
                <i class="bi bi-person-workspace"></i> Manage Teachers
            </a>


        </div>

    </div>

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
