<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Courses</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="d-flex">

    <div th:replace="fragments/sidebar :: sidebar"></div>
    <div th:replace="fragments/sidebar :: allcss"></div>


    <div class="flex-grow-1 p-4">

        <div class="d-flex justify-content-between align-items-center mb-3">
            <h2>Courses</h2>
            <a href="/course/add" class="btn btn-success">+ Add Course</a>
        </div>

        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

        <div class="card shadow-sm">
            <div class="card-body">
                <table class="table table-bordered table-striped">
                    <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Course Name</th>
                        <th>Course Description</th>
                        <th>Created At</th>
                        <th style="width:150px;">Actions</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="course : ${courses}">
                        <td th:text="${course.id}"></td>
                        <td th:text="${course.courseName}"></td>
                        <td th:text="${course.courseDescription}"></td>
                        <td th:text="${course.createdAt}"></td>
                        <td>
                            <!-- Edit Button -->
                            <form th:action="@{/course/edit}"
                                  method="post"
                                  style="display:inline;">
                                <input type="hidden" name="id"
                                       th:value="${course.id}"/>
                                <input type="hidden"
                                       th:name="${_csrf.parameterName}"
                                       th:value="${_csrf.token}"/>
                                <button type="submit"
                                        class="btn btn-sm btn-primary">
                                    Edit
                                </button>
                            </form>

                            <!-- Delete Button → triggers modal -->
                            <button type="button"
                                    class="btn btn-sm btn-danger"
                                    th:attr="data-id=${course.id},
                                             data-name=${course.courseName},
                                             data-csrf-name=${_csrf.parameterName},
                                             data-csrf-token=${_csrf.token}"
                                    onclick="openDeleteModal(this)">
                                Delete
                            </button>

                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>

    </div>

</div>

<!-- Delete Confirmation Modal -->
<!-- Delete Confirmation Modal -->
<div class="modal fade" id="deleteModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered modal-sm">
        <div class="modal-content">

            <div class="modal-header bg-danger text-white py-2">
                <h6 class="modal-title">Delete Course</h6>
                <button type="button" class="btn-close btn-close-white"
                        data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body py-2">
                <p class="mb-1">Delete <strong id="courseNameDisplay"></strong>?</p>
                <small class="text-muted">This cannot be undone.</small>
            </div>

            <div class="modal-footer py-2">
                <button type="button"
                        class="btn btn-secondary btn-sm"
                        data-bs-dismiss="modal">
                    Cancel
                </button>
                <form id="deleteForm" method="post">
                    <input type="hidden" name="id" id="deleteId"/>
                    <input type="hidden" id="csrfName" name="_csrf"/>
                    <button type="submit" class="btn btn-danger btn-sm">
                        Delete
                    </button>
                </form>
            </div>

        </div>
    </div>
</div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

<script>
    function openDeleteModal(button) {
        const id = button.getAttribute('data-id');
        const name = button.getAttribute('data-name');
        const csrfName = button.getAttribute('data-csrf-name');
        const csrfToken = button.getAttribute('data-csrf-token');

        // Fill modal with course details
        document.getElementById('courseNameDisplay').textContent = name;
        document.getElementById('deleteId').value = id;
        document.getElementById('deleteForm').action = '/course/delete';

        // Set CSRF
        const csrfInput = document.getElementById('csrfName');
        csrfInput.name = csrfName;
        csrfInput.value = csrfToken;

        // Show modal
        new bootstrap.Modal(document.getElementById('deleteModal')).show();
    }
</script>

</body>
</html>
