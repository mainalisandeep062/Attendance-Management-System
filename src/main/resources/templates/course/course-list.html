<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Courses</title>
</head>
<body>

<h2>Courses</h2>

<a href="/course/add">Add New Course</a>

<br/><br/>

<div th:if="${success}" th:text="${success}"></div>

<table border="1">
    <thead>
    <tr>
        <th>ID</th>
        <th>Course Name</th>
        <th>Course Description</th>
        <th>Credit Hours</th>
        <th>Created At</th>
        <th>Actions</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="course : ${courses}">
        <td th:text="${course.id}"></td>
        <td th:text="${course.courseName}"></td>
        <td th:text="${course.courseDescription}"></td>
        <td th:text="${course.creditHours}"></td>
        <td th:text="${course.createdAt}"></td>
        <td>
            <a th:href="@{/course/edit/{id}(id=${course.id})}">Edit</a>
            &nbsp;
            <a th:href="@{/course/delete/{id}(id=${course.id})}">Delete</a>
        </td>
    </tr>
    </tbody>
</table>

</body>
</html>
