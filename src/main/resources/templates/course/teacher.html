<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Teacher Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="d-flex">

    <div th:replace="~{fragments/sidebar :: sidebar}"></div>
    <div th:replace="~{fragments/sidebar :: allcss}"></div>

    <div class="flex-grow-1 p-4 mt-3">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h3 class="mb-0">Teachers</h3>
            <button type="button" class="btn btn-primary" id="addTeacherButton" data-bs-toggle="modal" data-bs-target="#teacherModal">
                Add Teacher
            </button>
        </div>

        <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
            <span th:text="${success}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <table class="table table-bordered table-striped">
            <thead class="table-dark">
            <tr>
                <th>SN</th>
                <th>Name</th>
                <th>Email</th>
                <th>Mobile</th>
                <th>Courses</th>
                <th>Actions</th>
            </tr>
            </thead>

            <tbody>
            <tr th:if="${#lists.isEmpty(teachers)}">
                <td colspan="6" class="text-center">No teachers found.</td>
            </tr>

            <tr th:each="teacher, loopStat : ${teachers}">
                <td th:text="${loopStat.count}"></td>
                <td th:text="${teacher.fullName}"></td>
                <td th:text="${teacher.email}"></td>
                <td th:text="${teacher.mobileNumber}"></td>
                <td class="teacher-courses-text">
                    <span th:if="${#lists.isEmpty(teacher.courses)}">None</span>
                    <span th:unless="${#lists.isEmpty(teacher.courses)}">
                        <span th:each="course, stat : ${teacher.courses}">
                            <span th:text="${course.courseName}"></span><span th:if="${!stat.last}">, </span>
                        </span>
                    </span>
                </td>
                <td>
                    <div class="d-none">
                        <input type="hidden" class="course-id-item" th:each="course : ${teacher.courses}" th:value="${course.id}"/>
                    </div>
                    <button type="button"
                            class="btn btn-warning btn-sm edit-teacher-btn"
                            data-bs-toggle="modal"
                            data-bs-target="#teacherModal"
                            th:attr="
                                data-id=${teacher.id},
                                data-name=${teacher.fullName},
                                data-email=${teacher.email},
                                data-mobile=${teacher.mobileNumber}
                            ">
                        Edit
                    </button>

                    <a th:href="@{/teacher/delete/{id}(id=${teacher.id})}"
                       class="btn btn-danger btn-sm"
                       onclick="return confirm('Are you sure?')">Delete</a>

                    <button class="btn btn-info btn-sm view-teacher-btn"
                            data-bs-toggle="modal"
                            data-bs-target="#viewModal"
                            th:attr="
                                data-id=${teacher.id},
                                data-name=${teacher.fullName},
                                data-email=${teacher.email},
                                data-mobile=${teacher.mobileNumber}
                            ">
                        View
                    </button>

                    <form th:action="@{/users/add}" method="post" class="d-inline">
                        <input type="hidden" name="username" th:value="${teacher.email}"/>
                        <input type="hidden" name="password" th:value="${teacher.mobileNumber}"/>
                        <input type="hidden" name="mobileNumber" th:value="${teacher.mobileNumber}"/>
                        <input type="hidden" name="email" th:value="${teacher.email}"/>
                        <input type="hidden" name="role" value="TEACHER"/>
                        <input type="hidden" name="fromTeacher" value="true"/>
                        <button type="submit"
                                class="btn btn-success btn-sm"
                                onclick="return confirm('Create a TEACHER user from this record?')">
                            Add as User
                        </button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<div class="modal fade" id="teacherModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content shadow">
            <form th:object="${teacherForm}" method="post" th:action="@{/teacher/save}">
                <div class="modal-header">
                    <h5 class="modal-title" id="teacherModalTitle" th:text="${teacherForm.id == null} ? 'Add Teacher' : 'Edit Teacher'"></h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">
                    <input type="hidden" th:field="*{id}" id="teacherId"/>

                    <div class="mb-3">
                        <label for="teacherFullName" class="form-label">Full Name</label>
                        <input type="text" th:field="*{fullName}" id="teacherFullName" class="form-control" required/>
                        <div class="text-danger small" th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}"></div>
                    </div>

                    <div class="mb-3">
                        <label for="teacherEmail" class="form-label">Email</label>
                        <input type="email" th:field="*{email}" id="teacherEmail" class="form-control" required/>
                        <div class="text-danger small" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
                    </div>

                    <div class="mb-3">
                        <label for="teacherMobile" class="form-label">Mobile Number</label>
                        <input type="text" th:field="*{mobileNumber}" id="teacherMobile" class="form-control" required/>
                        <div class="text-danger small" th:if="${#fields.hasErrors('mobileNumber')}" th:errors="*{mobileNumber}"></div>
                    </div>

                    <div class="mb-3">
                        <label for="teacherCourseIds" class="form-label">Courses</label>
                        <select th:field="*{courseIds}" id="teacherCourseIds" multiple class="form-select" size="8">
                            <option th:each="course : ${courses}"
                                    th:value="${course.id}"
                                    th:text="${course.courseName}">
                            </option>
                        </select>
                    </div>
                </div>

                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save</button>
                </div>
            </form>
        </div>
    </div>
</div>

<div class="modal fade" id="viewModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content shadow">
            <div class="modal-header">
                <h5 class="modal-title">Teacher Details</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body">
                <p><strong>ID:</strong> <span id="viewId"></span></p>
                <p><strong>Name:</strong> <span id="viewName"></span></p>
                <p><strong>Email:</strong> <span id="viewEmail"></span></p>
                <p><strong>Mobile:</strong> <span id="viewMobile"></span></p>
                <p><strong>Courses:</strong> <span id="viewCourses"></span></p>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

<script th:inline="javascript">
    const teacherModalElement = document.getElementById('teacherModal');
    const teacherModal = new bootstrap.Modal(teacherModalElement);

    const teacherModalTitle = document.getElementById('teacherModalTitle');
    const teacherIdInput = document.getElementById('teacherId');
    const teacherFullNameInput = document.getElementById('teacherFullName');
    const teacherEmailInput = document.getElementById('teacherEmail');
    const teacherMobileInput = document.getElementById('teacherMobile');
    const teacherCourseIdsSelect = document.getElementById('teacherCourseIds');

    document.getElementById('addTeacherButton').addEventListener('click', function () {
        teacherModalTitle.textContent = 'Add Teacher';
        teacherIdInput.value = '';
        teacherFullNameInput.value = '';
        teacherEmailInput.value = '';
        teacherMobileInput.value = '';

        Array.from(teacherCourseIdsSelect.options).forEach(option => {
            option.selected = false;
        });
    });

    document.querySelectorAll('.edit-teacher-btn').forEach(button => {
        button.addEventListener('click', function () {
            teacherModalTitle.textContent = 'Edit Teacher';
            teacherIdInput.value = this.getAttribute('data-id') || '';
            teacherFullNameInput.value = this.getAttribute('data-name') || '';
            teacherEmailInput.value = this.getAttribute('data-email') || '';
            teacherMobileInput.value = this.getAttribute('data-mobile') || '';

            const selectedCourseIds = Array.from(this.closest('tr').querySelectorAll('.course-id-item'))
                .map(input => input.value);

            Array.from(teacherCourseIdsSelect.options).forEach(option => {
                option.selected = selectedCourseIds.includes(option.value);
            });
        });
    });

    const showTeacherModal = /*[[${showTeacherModal}]]*/ false;
    if (showTeacherModal) {
        teacherModal.show();
    }

    const viewModal = document.getElementById('viewModal');
    viewModal.addEventListener('show.bs.modal', function (event) {
        const button = event.relatedTarget;
        const row = button.closest('tr');

        document.getElementById('viewId').textContent = button.getAttribute('data-id');
        document.getElementById('viewName').textContent = button.getAttribute('data-name');
        document.getElementById('viewEmail').textContent = button.getAttribute('data-email');
        document.getElementById('viewMobile').textContent = button.getAttribute('data-mobile');
        document.getElementById('viewCourses').textContent = row.querySelector('.teacher-courses-text').textContent.trim();
    });
</script>

</body>
</html>
