<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add/Edit Teacher</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="d-flex">

    <!-- Sidebar -->
    <div th:replace="fragments/sidebar :: sidebar"></div>

    <!-- Main Content -->
    <div class="flex-grow-1 p-4 mt-3">

        <div class="row justify-content-center">
            <div class="col-md-6">

                <div class="card p-3 shadow-sm">
                    <h5 th:text="${teacher.id != null} ? 'Edit Teacher' : 'Add Teacher'">Add Teacher</h5>

                    <form th:object="${teacher}" method="post"
                          th:action="${teacher.id == null ? '/teacher/add' : '/teacher/update'}">

                        <!-- Hidden ID field for edit -->
                        <input type="hidden" th:field="*{id}" />

                        <div class="mb-2">
                            <label>Full Name</label>
                            <input type="text" th:field="*{fullName}" class="form-control" required/>
                        </div>

                        <div class="mb-2">
                            <label>Email</label>
                            <input type="email" th:field="*{email}" class="form-control" required/>
                        </div>

                        <div class="mb-2">
                            <label>Mobile Number</label>
                            <input type="text" th:field="*{mobileNumber}" class="form-control" required/>
                        </div>

                        <div class="mb-2">
                            <label>Courses</label>
                            <select name="courseIds" multiple class="form-select">
                                <option th:each="course : ${courses}"
                                        th:value="${course.id}"
                                        th:text="${course.courseName}"
                                        th:selected="${teacher.courses != null and #lists.contains(teacher.courses, course)}">
                                </option>
                            </select>
                        </div>

                        <button type="submit" class="btn btn-primary w-100 mt-2">Save</button>
                        <a th:href="@{/teacher}" class="btn btn-secondary w-100 mt-2">Cancel</a>

                    </form>
                </div>

            </div>
        </div>

    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
