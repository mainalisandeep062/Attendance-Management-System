<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Teacher List</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="d-flex">
  <!-- Sidebar -->
  <div th:replace="fragments/sidebar :: sidebar"></div>
  <div th:replace="fragments/sidebar :: allcss"></div>


  <!-- Main Content -->
  <div class="flex-grow-1 p-4 mt-3">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h3>Teachers</h3>
      <a class="btn btn-success" th:href="@{/teacher/add}">+ Add Teacher</a>
    </div>

    <table class="table table-bordered">
      <thead class="table-dark">
      <tr>
        <th>ID</th>
        <th>Full Name</th>
        <th>Email</th>
        <th>Mobile</th>
        <th>Courses</th>
        <th>Actions</th>
      </tr>
      </thead>
      <tbody>
      <tr th:each="teacher : ${teachers}">
        <td th:text="${teacher.id}">1</td>
        <td th:text="${teacher.fullName}">John Doe</td>
        <td th:text="${teacher.email}">john@example.com</td>
        <td th:text="${teacher.mobileNumber}">1234567890</td>

        <td>
          <div class="dropdown">
            <button class="btn btn-secondary btn-sm dropdown-toggle" type="button" data-bs-toggle="dropdown" aria-expanded="false">
              <span th:text="${teacher.courses.size() > 0} ? ${teacher.courses[0].courseName} : 'No Courses'">Course Name</span>
            </button>
            <ul class="dropdown-menu">
              <li th:each="c : ${teacher.courses}">
                <a class="dropdown-item" href="#" th:text="${c.courseName}">Course Name</a>
              </li>
            </ul>
          </div>
        </td>
        <td>
          <a th:href="@{/teacher/edit/{id}(id=${teacher.id})}" class="btn btn-warning btn-sm">Edit</a>
          <a th:href="@{/teacher/delete/{id}(id=${teacher.id})}" class="btn btn-danger btn-sm">Delete</a>
        </td>
      </tr>
      </tbody>
    </table>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
