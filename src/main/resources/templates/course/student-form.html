<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add/Edit Student</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="d-flex">

    <!-- Sidebar -->
    <div th:replace="fragments/sidebar :: sidebar"></div>

    <!-- Main Content -->
    <div class="flex-grow-1 p-4 mt-3">

        <div class="row justify-content-center">
            <div class="col-md-4">

                <div class="card p-3 shadow-sm">
                    <h5 th:text="${student.id != null} ? 'Edit Student' : 'Add Student'">Add Student</h5>

                    <form th:object="${student}" method="post"
                          th:action="${student.id == null ? '/student/add' : '/student/update'}">

                        <!-- Hidden ID field for edit -->
                        <input type="hidden" th:field="*{id}"/>

                        <div class="mb-2">
                            <label>Full Name</label>
                            <input type="text" th:field="*{fullName}" class="form-control" required/>
                        </div>

                        <div class="mb-2">
                            <label>Mobile Number</label>
                            <input type="text" th:field="*{mobileNumber}" class="form-control" required/>
                        </div>

                        <div class="mb-2">
                            <label>Email</label>
                            <input type="email" th:field="*{email}" class="form-control" required/>
                        </div>

                        <div class="mb-2">
                            <label>Faculty</label>
                            <select th:field="*{faculty}" class="form-control" required>
                                <option value="" disabled selected>Select Faculty</option>
                                <option th:each="fac : ${T(com.texas.developers.ams.enums.Faculty).values()}"
                                        th:value="${fac.name()}"
                                        th:text="${fac.name()}"></option>
                            </select>
                        </div>

                        <div class="mb-2">
                            <label>College Join Date</label>
                            <input type="date" th:field="*{collegeJoinDate}" class="form-control" required/>
                        </div>

                        <button type="submit" class="btn btn-primary w-100 mt-2">Save</button>
                        <a th:href="@{/student}" class="btn btn-secondary w-100 mt-2">Cancel</a>

                    </form>
                </div>

            </div>
        </div>

    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
