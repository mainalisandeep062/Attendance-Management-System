<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Course Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="d-flex">

    <div th:replace="fragments/sidebar :: sidebar"></div>

    <div class="flex-grow-1 p-4">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h2>Courses</h2>
        </div>

        <h2 class="text-center mb-4"
            th:text="${course.id == null} ? 'Add Course' : 'Edit Course'"></h2>

        <div class="row justify-content-center">
            <div class="col-md-4">

                <!-- Unified Add/Edit Form -->
                <form th:object="${course}"
                      th:action="@{/course/save}"
                      method="post"
                      class="card p-4 shadow-sm">

                    <!-- Hidden field for ID -->
                    <input type="hidden" th:field="*{id}"/>

                    <div class="mb-3">
                        <label class="form-label">Course Name:</label>
                        <input type="text" th:field="*{courseName}" class="form-control" required/>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Course Description:</label>
                        <textarea th:field="*{courseDescription}" class="form-control" required></textarea>
                    </div>

                    <button type="submit" class="btn btn-primary w-100"
                            th:text="${course.id == null} ? 'Save' : 'Update'"></button>
                    <a href="/course" class="btn btn-secondary w-100 mt-2">Cancel</a>

                </form>

            </div>
        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
