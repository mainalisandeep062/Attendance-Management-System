<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Course Form</title>
</head>
<body>

<h2 th:text="${course.id == null} ? 'Add Course' : 'Edit Course'"></h2>

<form th:if="${course.id == null}" th:action="@{/course/add}" th:object="${course}" method="post">

    <label>Course Name:</label>
    <input type="text" th:field="*{courseName}" /><br/><br/>

    <label>Course Description:</label>
    <textarea th:field="*{courseDescription}"></textarea><br/><br/>

    <label>Credit Hours:</label>
    <input type="number" th:field="*{creditHours}" /><br/><br/>

    <button type="submit">Save</button>
    <a href="/course">Cancel</a>

</form>

<form th:if="${course.id != null}" th:action="@{/course/edit/{id}(id=${course.id})}" th:object="${course}" method="post">

    <label>Course Name:</label>
    <input type="text" th:field="*{courseName}" /><br/><br/>

    <label>Course Description:</label>
    <textarea th:field="*{courseDescription}"></textarea><br/><br/>

    <label>Credit Hours:</label>
    <input type="number" th:field="*{creditHours}" /><br/><br/>

    <button type="submit">Save</button>
    <a href="/course">Cancel</a>

</form>

</body>
</html>
