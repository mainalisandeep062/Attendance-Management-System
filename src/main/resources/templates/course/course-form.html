<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Course Form</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="d-flex">

    <!-- Sidebar -->
    <div th:replace="fragments/sidebar :: sidebar"></div>

    <!-- Main Content -->
    <div class="flex-grow-1 p-4">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h2>Courses</h2>
        </div>
        <h2 class="text-center mb-4"
            th:text="${course.id == null} ? 'Add Course' : 'Edit Course'"></h2>

        <!-- Centered Form Row -->
        <div class="row justify-content-center">
            <div class="col-md-4">

                <!-- Add Form -->
                <form th:if="${course.id == null}"
                      th:action="@{/course/add}"
                      th:object="${course}"
                      method="post"
                      class="card p-4 shadow-sm">

                    <div class="mb-3">
                        <label class="form-label">Course Name:</label>
                        <input type="text" th:field="*{courseName}" class="form-control"/>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Course Description:</label>
                        <textarea th:field="*{courseDescription}" class="form-control"></textarea>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Credit Hours:</label>
                        <input type="number" th:field="*{creditHours}" class="form-control"/>
                    </div>

                    <button type="submit" class="btn btn-primary w-100">Save</button>
                    <a href="/course" class="btn btn-secondary w-100 mt-2">Cancel</a>

                </form>

                <!-- Edit Form -->
                <form th:if="${course.id != null}"
                      th:action="@{/course/edit/{id}(id=${course.id})}"
                      th:object="${course}"
                      method="post"
                      class="card p-4 shadow-sm">

                    <div class="mb-3">
                        <label class="form-label">Course Name:</label>
                        <input type="text" th:field="*{courseName}" class="form-control"/>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Course Description:</label>
                        <textarea th:field="*{courseDescription}" class="form-control"></textarea>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Credit Hours:</label>
                        <input type="number" th:field="*{creditHours}" class="form-control"/>
                    </div>

                    <button type="submit" class="btn btn-primary w-100">Update</button>
                    <a href="/course" class="btn btn-secondary w-100 mt-2">Cancel</a>

                </form>

            </div>
        </div>

    </div>

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
