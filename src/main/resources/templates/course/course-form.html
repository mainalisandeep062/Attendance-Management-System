<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Courses</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="d-flex">

    <div th:replace="fragments/sidebar :: sidebar"></div>
    <div th:replace="fragments/sidebar :: allcss"></div>


    <div class="flex-grow-1 p-4">

        <div class="d-flex justify-content-between align-items-center mb-3">
            <h2>Courses</h2>
            <button class="btn btn-success" onclick="openAddModal()">
                + Add Course
            </button>
        </div>

        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

        <div class="card shadow-sm">
            <div class="card-body p-0">
                <table class="table table-bordered table-striped mb-0">
                    <thead class="table-dark">
                    <tr>
                        <th>#</th>
                        <th>Course Name</th>
                        <th>Description</th>
                        <th style="width:150px;">Actions</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="course, iterStat : ${courses}">
                        <td th:text="${iterStat.count}"></td>
                        <td th:text="${course.courseName}"></td>
                        <td th:text="${course.courseDescription}"></td>
                        <td>
                            <!-- Edit Button -->
                            <button type="button"
                                    class="btn btn-sm btn-primary"
                                    th:attr="data-id=${course.id},
                                             data-name=${course.courseName},
                                             data-desc=${course.courseDescription}"
                                    onclick="openEditModal(this)">
                                Edit
                            </button>

                            <!-- Delete Button -->
                            <button type="button"
                                    class="btn btn-sm btn-danger"
                                    th:attr="data-id=${course.id},
                                             data-name=${course.courseName},
                                             data-csrf-name=${_csrf.parameterName},
                                             data-csrf-token=${_csrf.token}"
                                    onclick="openDeleteModal(this)">
                                Delete
                            </button>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>

    </div>
</div>

<!-- Add/Edit Course Modal -->
<div class="modal fade" id="courseModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">

            <div class="modal-header">
                <h5 class="modal-title" id="courseModalTitle">Add Course</h5>
                <button type="button" class="btn-close"
                        data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body">
                <form id="courseForm" method="post">
                    <input type="hidden" name="id" id="courseId"/>
                    <input type="hidden" id="coursecsrf"
                           th:name="${_csrf.parameterName}"
                           th:value="${_csrf.token}"/>

                    <div class="mb-3">
                        <label class="form-label fw-semibold">Course Name</label>
                        <input type="text" id="courseNameInput"
                               name="courseName"
                               class="form-control"
                               placeholder="Enter course name" required/>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold">Description</label>
                        <textarea id="courseDescInput"
                                  name="courseDescription"
                                  class="form-control"
                                  rows="4"
                                  placeholder="Enter description" required></textarea>
                    </div>

                </form>
            </div>

            <div class="modal-footer">
                <button type="button"
                        class="btn btn-secondary"
                        data-bs-dismiss="modal">Cancel</button>
                <button type="button"
                        class="btn btn-primary"
                        id="courseSubmitBtn"
                        onclick="submitCourseForm()">Save</button>
            </div>

        </div>
    </div>
</div>

<!-- Delete Confirmation Modal -->
<div class="modal fade" id="deleteModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered modal-sm">
        <div class="modal-content">
            <div class="modal-header bg-danger text-white py-2">
                <h6 class="modal-title">Delete Course</h6>
                <button type="button" class="btn-close btn-close-white"
                        data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body py-2">
                <p class="mb-1">Delete <strong id="deleteCourseName"></strong>?</p>
                <small class="text-muted">This cannot be undone.</small>
            </div>
            <div class="modal-footer py-2">
                <button type="button"
                        class="btn btn-secondary btn-sm"
                        data-bs-dismiss="modal">Cancel</button>
                <form id="deleteForm" method="post">
                    <input type="hidden" name="id" id="deleteId"/>
                    <input type="hidden" id="deleteCsrf"/>
                    <button type="submit" class="btn btn-danger btn-sm">Delete</button>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
<script>
    function openAddModal() {
        document.getElementById('courseModalTitle').textContent = 'Add Course';
        document.getElementById('courseSubmitBtn').textContent = 'Save';
        document.getElementById('courseId').value = '';
        document.getElementById('courseNameInput').value = '';
        document.getElementById('courseDescInput').value = '';
        document.getElementById('courseForm').action = '/course/save';
        new bootstrap.Modal(document.getElementById('courseModal')).show();
    }

    function openEditModal(button) {
        const id = button.getAttribute('data-id');
        const name = button.getAttribute('data-name');
        const desc = button.getAttribute('data-desc');

        document.getElementById('courseModalTitle').textContent = 'Edit Course';
        document.getElementById('courseSubmitBtn').textContent = 'Update';
        document.getElementById('courseId').value = id;
        document.getElementById('courseNameInput').value = name;
        document.getElementById('courseDescInput').value = desc;
        document.getElementById('courseForm').action = '/course/save';

        new bootstrap.Modal(document.getElementById('courseModal')).show();
    }

    function submitCourseForm() {
        document.getElementById('courseForm').submit();
    }

    function openDeleteModal(button) {
        const id = button.getAttribute('data-id');
        const name = button.getAttribute('data-name');
        const csrfName = button.getAttribute('data-csrf-name');
        const csrfToken = button.getAttribute('data-csrf-token');

        document.getElementById('deleteCourseName').textContent = name;
        document.getElementById('deleteId').value = id;
        document.getElementById('deleteForm').action = '/course/delete';

        const csrf = document.getElementById('deleteCsrf');
        csrf.name = csrfName;
        csrf.value = csrfToken;

        new bootstrap.Modal(document.getElementById('deleteModal')).show();
    }
</script>

</body>
</html>
